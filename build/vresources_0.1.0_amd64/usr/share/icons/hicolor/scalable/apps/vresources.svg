<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Core Gradients -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e24" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f0f12" stop-opacity="0.95"/>
    </linearGradient>
    
    <linearGradient id="neonV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#9b51e0"/>
    </linearGradient>
    
    <linearGradient id="glowPulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#70ff00" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9b51e0" stop-opacity="0.8"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background Shield (Glassmorphic Circle) -->
  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="230" fill="url(#shieldGrad)" stroke="url(#borderGrad)" stroke-width="4"/>
    <circle cx="256" cy="256" r="228" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  </g>

  <!-- Hexagonal Tech Grid Accents -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1.5" fill="none">
    <polygon points="256,70 366,134 366,262 256,326 146,262 146,134"/>
    <polygon points="256,120 322,158 322,234 256,272 190,234 190,158"/>
    <polygon points="256,170 278,183 278,208 256,221 234,208 234,183"/>
    <line x1="256" y1="70" x2="256" y2="120"/>
    <line x1="366" y1="134" x2="322" y2="158"/>
    <line x1="366" y1="262" x2="322" y2="234"/>
    <line x1="256" y1="326" x2="256" y2="272"/>
    <line x1="146" y1="262" x2="190" y2="234"/>
    <line x1="146" y1="134" x2="190" y2="158"/>
  </g>

  <!-- Glowing Telemetry Pulse Waves in Background -->
  <path d="M 90 280 L 150 280 L 170 240 L 195 340 L 220 200 L 245 310 L 260 280 L 422 280" 
        fill="none" stroke="url(#glowPulse)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
        opacity="0.45" filter="url(#neonGlow)"/>

  <!-- Stylized Neon Letter 'V' (representing VResources & Venom) -->
  <g filter="url(#neonGlow)">
    <!-- Right Wing of V -->
    <path d="M 256 390 L 370 160 C 375 150, 390 155, 385 170 L 285 395 C 275 415, 237 415, 227 395 L 127 170 C 122 155, 137 150, 142 160 Z" 
          fill="url(#neonV)" opacity="0.95"/>
    
    <!-- Inner Core Cutout for dynamic look -->
    <path d="M 256 350 L 335 190 L 256 315 L 177 190 Z" fill="#0c0c0f" opacity="0.9"/>
  </g>

  <!-- Glowing Tech Dots (representing CPU cores / nodes) -->
  <g fill="#00f2fe" filter="url(#neonGlow)">
    <circle cx="256" cy="70" r="5"/>
    <circle cx="366" cy="134" r="5"/>
    <circle cx="366" cy="262" r="5"/>
    <circle cx="256" cy="326" r="5"/>
    <circle cx="146" cy="262" r="5"/>
    <circle cx="146" cy="134" r="5"/>
  </g>
  
  <g fill="#9b51e0" filter="url(#neonGlow)">
    <circle cx="256" cy="120" r="4"/>
    <circle cx="322" cy="158" r="4"/>
    <circle cx="322" cy="234" r="4"/>
    <circle cx="256" cy="272" r="4"/>
    <circle cx="190" cy="234" r="4"/>
    <circle cx="190" cy="158" r="4"/>
  </g>
</svg>
